<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมเติมตัวอักษรภาษาอังกฤษ</title>
    <style>
        body { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; background-color: #ffeaa7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .game-container { background-color: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; }
        h1 { color: #ff7675; font-size: 26px; margin-top: 0; margin-bottom: 20px; }
        
        /* Category Menu Styles */
        #category-menu h2 { color: #0984e3; font-size: 20px; margin-bottom: 10px; }
        
        .menu-scroll-container { max-height: 55vh; overflow-y: auto; padding: 5px; margin-bottom: 15px; border-radius: 12px; }
        .menu-scroll-container::-webkit-scrollbar { width: 8px; }
        .menu-scroll-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .menu-scroll-container::-webkit-scrollbar-thumb { background: #00cec9; border-radius: 10px; }
        .menu-scroll-container::-webkit-scrollbar-thumb:hover { background: #01a3a4; }

        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cat-btn { background-color: #00cec9; color: white; border: none; padding: 12px 10px; font-size: 15px; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 0 #01a3a4; transition: transform 0.1s; font-family: inherit; font-weight: bold;}
        .cat-btn:hover { background-color: #01a3a4; }
        .cat-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #01a3a4; }
        
        /* Game Play Styles */
        .score { font-size: 18px; color: #00cec9; font-weight: bold; margin-bottom: 15px; }
        .image-box { font-size: 80px; margin: 10px 0; line-height: 1; }
        .audio-btn { background-color: #fdcb6e; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; box-shadow: 0 5px 0 #e1b12c; transition: transform 0.1s; margin-bottom: 15px; }
        .audio-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #e1b12c; }
        .word-display { font-size: 32px; letter-spacing: 10px; font-weight: bold; color: #2d3436; margin-bottom: 25px; }
        .options-container { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .option-btn { background-color: #74b9ff; color: white; border: none; border-radius: 15px; width: 65px; height: 65px; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #0984e3; transition: all 0.2s; font-family: inherit; }
        .option-btn:hover { background-color: #0984e3; }
        .option-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #0984e3; }
        .message { font-size: 22px; font-weight: bold; height: 30px; margin-bottom: 15px; }
        .correct { color: #00b894; }
        .wrong { color: #d63031; }
        
        /* Control Buttons */
        .control-btn { background-color: #00b894; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #009432; font-family: inherit; font-weight: bold; transition: transform 0.1s; }
        .control-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #009432; }
        .btn-purple { background-color: #9b59b6; box-shadow: 0 4px 0 #8e44ad; }
        .btn-purple:active { box-shadow: 0 0 0 #8e44ad; }
        .btn-orange { background-color: #f39c12; box-shadow: 0 4px 0 #d35400; }
        .btn-orange:active { box-shadow: 0 0 0 #d35400; }
        
        .in-game-controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; border-top: 2px dashed #eee; padding-top: 20px; }
        .end-game-controls { display: flex; flex-direction: column; gap: 12px; align-items: center; margin-top: 20px; }

</head>

            <button class="control-btn btn-purple" onclick="location.reload()">🏠 หน้าหลัก</button>
        </div>

        <div class="end-game-controls" id="end-game-controls" style="display: none;">

</div>

        { word: "NURSE", missingIndex: 1, options: ["U", "O", "A"], image: "👩‍⚕️", category: "occupation" },
        { word: "PILOT", missingIndex: 1, options: ["I", "E", "A"], image: "🧑‍✈️", category: "occupation" },
        { word: "CHEF", missingIndex: 2, options: ["E", "A", "O"], image: "🧑‍🍳", category: "occupation" },
        { word: "POLICE", missingIndex: 1, options: ["O", "U", "A"], image: "👮", category: "occupation" }
    ];

    let gameQuestions = []; 
    let currentQuestionIndex = 0;
    let score = 0;
    let currentCategory = "";

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function playWordAudio() {
        if (!gameQuestions[currentQuestionIndex]) return;
        const currentWord = gameQuestions[currentQuestionIndex].word;
        const utterance = new SpeechSynthesisUtterance(currentWord);
        utterance.lang = 'en-US'; 
        utterance.rate = 0.75;
        window.speechSynthesis.speak(utterance);
    }

    function showCategoryMenu() {
        document.getElementById("category-menu").style.display = "block";
        document.getElementById("game-section").style.display = "none";
        window.speechSynthesis.cancel(); 
    }

    function selectCategory(category) {
        currentCategory = category;
        startCurrentCategoryGame();
    }

    function startCurrentCategoryGame() {
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById("score").innerText = score;
        
        document.getElementById("category-menu").style.display = "none";
        document.getElementById("game-section").style.display = "block";
        document.getElementById("game-area").style.display = "block";
        document.getElementById("in-game-controls").style.display = "flex";
        document.getElementById("end-game-controls").style.display = "none";
        document.getElementById("message").innerText = "";
        
        let filteredWords = vocabularyDatabase.filter(item => item.category === currentCategory);
        let shuffledList = shuffle([...filteredWords]);
        // ตัดมา 5 ข้อ หรือเท่าที่มีถ้ามีไม่ถึง
        gameQuestions = shuffledList.slice(0, Math.min(5, shuffledList.length));
        
        loadQuestion();
    }

    function loadQuestion() {
        const currentData = gameQuestions[currentQuestionIndex];
        
        document.getElementById("image-box").innerText = currentData.image;
        
        let displayWord = "";
        for (let i = 0; i < currentData.word.length; i++) {
            if (i === currentData.missingIndex) {
                displayWord += "_ ";
            } else {
                displayWord += currentData.word[i] + " ";
            }
        }
        document.getElementById("word-display").innerText = displayWord.trim();
        
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        
        let optionsToDisplay = [...currentData.options]; 
        shuffle(optionsToDisplay); 
        
        optionsToDisplay.forEach(option => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = option;
            btn.onclick = () => checkAnswer(option);
            optionsContainer.appendChild(btn);
        });

        document.getElementById("message").innerText = "";
    }

    function checkAnswer(selectedLetter) {
        const currentData = gameQuestions[currentQuestionIndex];
        const correctLetter = currentData.word[currentData.missingIndex];
        const messageEl = document.getElementById("message");
        
        const optionBtns = document.querySelectorAll('.option-btn');
        optionBtns.forEach(btn => btn.disabled = true);

        if (selectedLetter === correctLetter) {
            messageEl.innerText = "⭐ เก่งมากครับ! ⭐";
            messageEl.className = "message correct";
            score++;
            document.getElementById("score").innerText = score;
            playWordAudio();
            setTimeout(nextQuestion, 1500);
        } else {
            messageEl.innerText = "❌ ลองอีกทีนะจ๊ะ ❌";
            messageEl.className = "message wrong";
            setTimeout(() => {
                optionBtns.forEach(btn => btn.disabled = false);
                messageEl.innerText = "";
            }, 1000);
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < gameQuestions.length) {
            loadQuestion();
        } else {
            document.getElementById("game-area").style.display = "none";
            document.getElementById("in-game-controls").style.display = "none";
            document.getElementById("message").innerText = `🎉 จบเกมแล้ว! ได้คะแนน ${score} / ${gameQuestions.length}`;
            document.getElementById("message").className = "message correct";
            document.getElementById("end-game-controls").style.display = "flex";
        }
    }
</script>

</body>
</html>
