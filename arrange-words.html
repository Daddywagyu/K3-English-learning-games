<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมเรียงตัวอักษรภาษาอังกฤษ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; background-color: #ffeaa7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .game-container { background-color: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; }
        h1 { color: #ff7675; font-size: 22px; margin-bottom: 15px; }
        
        /* Menu */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .cat-btn { background-color: #00cec9; color: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: bold; transition: transform 0.1s; }
        .cat-btn:hover { background-color: #01a3a4; }
        .cat-btn:active { transform: translateY(3px); }

        /* Game */
        .score { font-size: 18px; color: #00cec9; font-weight: bold; margin-bottom: 15px; }
        .image-box { font-size: 70px; margin: 10px 0; }
        .audio-btn { background-color: #fdcb6e; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 25px; cursor: pointer; box-shadow: 0 5px 0 #e1b12c; margin-bottom: 20px; }
        .answer-box { min-height: 60px; font-size: 35px; font-weight: bold; color: #2d3436; margin-bottom: 20px; border-bottom: 3px solid #dfe6e9; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .letters-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .letter-btn { background-color: #74b9ff; color: white; border: none; border-radius: 10px; width: 50px; height: 50px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #0984e3; }
        .letter-btn:active { transform: translateY(3px); box-shadow: none; }
        
        /* Controls */
        .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn { border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; color: white; }
        .btn-clear { background-color: #ff7675; }
        .btn-menu { background-color: #a29bfe; }
        .btn-home { background-color: #6c5ce7; }
        .message { font-size: 20px; font-weight: bold; margin-top: 15px; height: 30px; }
        .correct { color: #00b894; }
        .wrong { color: #d63031; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="menu-section">
        <h1>เลือกหมวดหมู่ (24 หมวด)</h1>
        <div class="category-grid" id="category-grid"></div>
        <button class="btn btn-home" style="margin-top: 10px;" onclick="location.href='index.html'">🏠 กลับสู่หน้าหลัก</button>
    </div>

    <div id="game-section" style="display: none;">
        <h1>เรียงคำศัพท์!</h1>
        <div class="score">คะแนน: <span id="score">0</span> / 5</div>
        <div class="image-box" id="image-box">🍎</div>
        <button class="audio-btn" onclick="playWordAudio()">🔊</button>
        <div class="answer-box" id="answer-box"></div>
        <div class="letters-container" id="letters-container"></div>
        <div class="controls">
            <button class="btn btn-clear" onclick="clearAnswer()">ลบคำตอบ</button>
            <button class="btn btn-menu" onclick="showMenu()">เปลี่ยนหมวด</button>
            <button class="btn btn-home" onclick="location.href='index.html'">หน้าหลัก</button>
        </div>
        <div class="message" id="message"></div>
    </div>
</div>

    let gameQuestions = [];
    let currentQuestionIndex = 0;

    let currentGuess = "";

    function initMenu() {
        const grid = document.getElementById("category-grid");
        Object.keys(vocabularyDatabase).forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "cat-btn";
            btn.innerText = cat;
            btn.onclick = () => startRound(cat);
            grid.appendChild(btn);
        });
    }

    function startRound(catName) {
        const allWords = vocabularyDatabase[catName];
        // สุ่ม 5 คำ (หรือเอาทั้งหมดถ้ามีไม่ถึง 5)
        gameQuestions = [...allWords].sort(() => Math.random() - 0.5).slice(0, 5);
        score = 0;
        currentQuestionIndex = 0;
        document.getElementById("score").innerText = score;
        document.getElementById("menu-section").style.display = "none";
        document.getElementById("game-section").style.display = "block";
        loadQuestion();
    }

    function showMenu() {
        document.getElementById("menu-section").style.display = "block";
        document.getElementById("game-section").style.display = "none";
    }

    function puzzleLetters(word) {
        // เอาเฉพาะตัวอักษร A-Z มาเรียง (ตัดช่องว่างและขีดกลางออก เช่น "T-SHIRT" -> TSHIRT)
        return word.replace(/[^A-Z]/g, '').split('');
    }

    function loadQuestion() {
        currentGuess = "";
        document.getElementById("answer-box").innerText = "";
        const data = gameQuestions[currentQuestionIndex];
        document.getElementById("image-box").innerText = data.image;
        document.getElementById("message").innerText = "";
        
        const letters = puzzleLetters(data.word);
        const shuffled = [...letters].sort(() => Math.random() - 0.5);
        
        const container = document.getElementById("letters-container");
        container.innerHTML = "";
        
        shuffled.forEach((letter, index) => {
            const btn = document.createElement("button");
            btn.className = "letter-btn";
            btn.innerText = letter;
            btn.id = "btn-" + index;
            btn.onclick = () => addLetter(letter, btn.id);
            container.appendChild(btn);
        });
    }

    function addLetter(letter, btnId) {
        document.getElementById(btnId).style.visibility = "hidden";
        currentGuess += letter;
        document.getElementById("answer-box").innerText = currentGuess;
        if (currentGuess.length === puzzleLetters(gameQuestions[currentQuestionIndex].word).length) {
            checkAnswer();
        }
    }

    function clearAnswer() {
        currentGuess = "";
        document.getElementById("answer-box").innerText = "";
        document.querySelectorAll(".letter-btn").forEach(btn => btn.style.visibility = "visible");
    }

    function checkAnswer() {
        const correctWord = puzzleLetters(gameQuestions[currentQuestionIndex].word).join('');
        const msg = document.getElementById("message");
        if (currentGuess === correctWord) {
            msg.innerText = "เก่งมาก! ⭐";
            msg.className = "message correct";
            score++;
            document.getElementById("score").innerText = score;
            playWordAudio();
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < gameQuestions.length) loadQuestion();
                else {
                    msg.innerText = "จบแล้ว! ได้คะแนน: " + score;
                    setTimeout(showMenu, 2000);
                }
            }, 1000);
        } else {
            msg.innerText = "ลองใหม่นะ! ❌";
            msg.className = "message wrong";
            setTimeout(clearAnswer, 1000);
        }
    }

    function playWordAudio() {
        const utterance = new SpeechSynthesisUtterance(gameQuestions[currentQuestionIndex].word);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    window.onload = initMenu;
</script>

</body>
</html>
